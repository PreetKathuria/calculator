<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    
    <main>
        <div class="calculator">
            <div class="monitor"><input value="" placeholder="0"></div>
            <div class="buttons">
                <div class="sign"><button>AC</button></div>
                <div class="sign"><button>DEL</button></div>
                <div class="sign"><button>%</button></div>
                <div class="sign"><button>/</button></div>
                <div class="numb"><button>7</button></div>
                <div class="numb"><button>8</button></div>
                <div class="numb"><button>9</button></div>
                <div class="sign"><button>*</button></div>
                <div class="numb"><button>4</button></div>
                <div class="numb"><button>5</button></div>
                <div class="numb"><button>6</button></div>
                <div class="sign"><button>-</button></div>
                <div class="numb"><button>1</button></div>
                <div class="numb"><button>2</button></div>
                <div class="numb"><button>3</button></div>
                <div class="sign"><button>+</button></div>
                <div class="numb"><button>00</button></div>
                <div class="numb"><button>0</button></div>
                <div class="sign"><button>.</button></div>
                <div class="equal"><button>=</button></div>
            </div>
        </div>
    </main>

    <script src="calculator.js"></script>
</body>
</html>
